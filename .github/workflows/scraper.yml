name: Regulatory Scraper

on:
  schedule:
    # 08:00 y 12:00 hora peninsular España
    # Verano CEST (UTC+2): 06:00 y 10:00 UTC
    # Invierno CET  (UTC+1): 07:00 y 11:00 UTC
    # Usamos horario verano como referencia (abril–octubre)
    - cron: '0 6 * * 1-6'   # Lunes–Sábado 08:00 CEST
    - cron: '0 10 * * 1-5'  # Lunes–Viernes 12:00 CEST
  workflow_dispatch:          # Permite ejecución manual desde GitHub

permissions:
  contents: write   # Necesario para hacer push a gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run scrapers ──────────────────────────────────────────────────
      - name: Scrape BOE + CNMC → PostgreSQL → web/data.json
        env:
          DATABASE_URL: ${{ secrets.BBDD }}
          BOE_KEYWORDS:  ${{ vars.BOE_KEYWORDS }}
        run: python main.py

      # ── 4. Generar resúmenes e impacto REE (solo entradas nuevas) ────────
      - name: Generar resúmenes con Claude Haiku
        env:
          DATABASE_URL:      ${{ secrets.BBDD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_summaries.py --limit 30
        continue-on-error: true   # no bloquea el deploy si falla

      # ── 5. Deploy web/ to GitHub Pages ──────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          commit_message: "chore: actualización automática de datos regulatorios"
          force_orphan: false
