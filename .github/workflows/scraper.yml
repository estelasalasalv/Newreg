name: Regulatory Scraper

on:
  schedule:
    # Adelantadas 10 min para compensar el retraso habitual de GitHub Actions
    # en triggers "schedule" de repos con poca actividad (puede tardar horas
    # en disparar la ejecución respecto a la hora programada).
    - cron: '45 5 * * 1-6'  # Lunes–Sábado 07:45 CEST (05:45 UTC)
    - cron: '50 9 * * 1-5'  # Lunes–Viernes 11:50 CEST (09:50 UTC)
  workflow_dispatch:          # Permite ejecución manual desde GitHub

permissions:
  contents: write   # Necesario para hacer push a gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # Ampliado: CNMC puede tardar con timeouts

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run scrapers ──────────────────────────────────────────────────
      - name: Scrape BOE + CNMC → PostgreSQL → web/data.json
        env:
          DATABASE_URL: ${{ secrets.BBDD }}
        run: python main.py
        continue-on-error: false   # Fallo crítico — sin datos no desplegamos

      # ── 4. Generar resúmenes con Claude (desactivado — requiere ANTHROPIC_API_KEY) ──
      # Activar cuando se disponga de clave Anthropic:
      # - name: Generar resúmenes con Claude Haiku
      #   env:
      #     DATABASE_URL:      ${{ secrets.BBDD }}
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: python generate_summaries.py --limit 30
      #   continue-on-error: true

      # ── 5. Análisis REE con Claude (desactivado — requiere ANTHROPIC_API_KEY) ──
      # - name: Análisis funciones REE con Claude
      #   env:
      #     DATABASE_URL:      ${{ secrets.BBDD }}
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: python generate_ree_analysis.py --limit 30
      #   continue-on-error: true

      # ── 6. Deploy web/ to GitHub Pages ──────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          commit_message: "chore: actualización automática de datos regulatorios"
          force_orphan: false
