<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56a3" />
  <title>Monitor Regulatorio Energético</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #1a56a3;
      --accent: #e8f0fe;
      --border: #dde3ec;
      --text: #1f2937;
      --muted: #6b7280;
      --boe: #1a56a3;
      --cnmc: #0f7b55;
      --tag-bg-boe: #dbeafe;
      --tag-bg-cnmc: #d1fae5;
      --tag-bg-imp: #fef3c7;
      --tag-imp: #92400e;
      --tag-bg-acc: #ede9fe;
      --tag-acc: #5b21b6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* ── HEADER ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1rem; font-weight: 700; line-height: 1.2; flex: 1; }
    @media (min-width: 480px) { header h1 { font-size: 1.2rem; } }
    @media (min-width: 768px) { header h1 { font-size: 1.35rem; } }

    #last-updated { font-size: 0.72rem; opacity: 0.8; white-space: nowrap; display: none; }
    @media (min-width: 400px) { #last-updated { display: block; } }


    /* ── PESTAÑAS ── */
    .tabs {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      display: flex;
      position: sticky;
      top: 56px;   /* altura del header */
      z-index: 15;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ── TOOLBAR (pestaña Todas) ── */
    .toolbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .toolbar input {
      flex: 1 1 100%;
      min-width: 0;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
    }
    @media (min-width: 560px) { .toolbar input { flex: 1 1 200px; } }

    .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border); border-radius: 20px;
      background: #fff; cursor: pointer;
      font-size: 0.85rem; font-weight: 500;
      min-height: 36px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--primary); }
    .filter-btn[data-source="BOE"].active  { background: var(--tag-bg-boe);  border-color: var(--boe); }
    .filter-btn[data-source="CNMC"].active { background: var(--tag-bg-cnmc); border-color: var(--cnmc); }

    #count { font-size: 0.8rem; color: var(--muted); margin-left: auto; white-space: nowrap; align-self: center; }

    /* ── MAIN ── */
    main { max-width: 900px; margin: 0 auto; padding: 0.75rem 0.75rem 2rem; }
    @media (min-width: 768px) { main { padding: 1.25rem 1rem 2rem; } }

    /* ── TARJETA GENERAL ── */
    .entry {
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      transition: box-shadow 0.15s;
    }
    .entry.src-BOE  { border-left-color: var(--boe); }
    .entry.src-CNMC { border-left-color: var(--cnmc); }
    .entry:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }

    .entry-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin-bottom: 0.4rem; }
    .tag { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-BOE  { background: var(--tag-bg-boe);  color: var(--boe); }
    .tag-CNMC { background: var(--tag-bg-cnmc); color: var(--cnmc); }
    .date { font-size: 0.78rem; color: var(--muted); }
    .dept { font-size: 0.76rem; color: var(--muted); }
    .entry h2 { font-size: 0.92rem; font-weight: 600; line-height: 1.45; margin-bottom: 0.3rem; }
    @media (min-width: 600px) { .entry h2 { font-size: 1rem; } }
    .entry h2 a { color: var(--text); text-decoration: none; }
    .entry h2 a:hover { color: var(--primary); text-decoration: underline; }
    .summary { font-size: 0.82rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.25rem; }
    .section-badge { font-size: 0.73rem; color: var(--muted); font-style: italic; }
    .badges { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .badge { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.55rem; border-radius: 4px; white-space: nowrap; }
    .badge-imp { background: var(--tag-bg-imp); color: var(--tag-imp); }
    .badge-acc { background: var(--tag-bg-acc); color: var(--tag-acc); }

    /* ── TARJETA BOE DETALLADA (pestaña BOE Último Mes) ── */
    .boe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--boe);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: box-shadow 0.15s;
    }
    .boe-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }

    .boe-card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .boe-date {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--boe);
      background: var(--tag-bg-boe);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .boe-card h2 {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.6rem;
      flex: 1 1 100%;
    }
    @media (min-width: 600px) { .boe-card h2 { font-size: 1.05rem; } }
    .boe-card h2 a { color: var(--text); text-decoration: none; }
    .boe-card h2 a:hover { color: var(--primary); text-decoration: underline; }

    .boe-fields {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.3rem;
    }
    @media (min-width: 560px) { .boe-fields { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 800px) { .boe-fields { grid-template-columns: 1fr 1fr 1fr; } }

    .boe-field { font-size: 0.8rem; line-height: 1.4; }
    .boe-field-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: block;
      margin-bottom: 0.1rem;
    }
    .boe-field-value { color: var(--text); }
    .boe-field-empty { color: var(--muted); font-style: italic; }

    .boe-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.65rem; padding-top: 0.6rem; border-top: 1px solid var(--border); }

    /* ── Barra de búsqueda pestaña BOE ── */
    .boe-toolbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .boe-toolbar input {
      flex: 1 1 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
    }
    @media (min-width: 560px) { .boe-toolbar input { flex: 1 1 200px; } }

    /* Filtro Importante */
    #boe-filter-imp {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    #boe-filter-imp input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }

    #boe-count { font-size: 0.8rem; color: var(--muted); margin-left: auto; white-space: nowrap; align-self: center; }

    /* ── ESTADOS ── */
    .state-msg { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 0.95rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.25rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f2937; color: #fff;
      padding: 0.6rem 1.2rem; border-radius: 24px;
      font-size: 0.85rem; pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0; white-space: nowrap; z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── FOOTER ── */
    footer { text-align: center; font-size: 0.78rem; color: var(--muted); padding: 1.5rem 1rem; }
    footer a { color: var(--primary); }

    /* ── Ocultar paneles inactivos ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Tarjeta CNMC Q1 (más compacta que BOE) ── */
    .cnmc-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--cnmc);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.55rem;
      transition: box-shadow 0.15s;
    }
    .cnmc-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
    .cnmc-card h2 { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.35rem; }
    @media (min-width: 600px) { .cnmc-card h2 { font-size: 0.97rem; } }
    .cnmc-card h2 a { color: var(--text); text-decoration: none; }
    .cnmc-card h2 a:hover { color: var(--cnmc); text-decoration: underline; }
    .cnmc-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 0.35rem; }
    .cnmc-date { font-size: 0.75rem; font-weight: 600; color: var(--cnmc); background: var(--tag-bg-cnmc); padding: .12rem .45rem; border-radius: 4px; }
    .cnmc-summary { font-size: 0.8rem; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── Etiquetas de recencia CNMC ── */
    .recency {
      font-size: 0.68rem; font-weight: 700;
      padding: 0.12rem 0.45rem; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .rec-hoy       { background: #dcfce7; color: #15803d; }
    .rec-semana    { background: #d1fae5; color: #047857; }
    .rec-mes       { background: #dbeafe; color: #1d4ed8; }
    .rec-trimestre { background: #e0f2fe; color: #0369a1; }
    .rec-semestre  { background: #fef3c7; color: #b45309; }
    .rec-anio      { background: #f3f4f6; color: #374151; }

    /* ── Resumen e impacto REE ── */
    .ai-block {
      margin-top: 0.5rem;
      padding: 0.5rem 0.7rem;
      border-radius: 6px;
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .ai-resumen {
      background: #f8fafc;
      border-left: 3px solid var(--border);
      color: var(--text);
    }
    .ai-ree {
      background: #fff7ed;
      border-left: 3px solid #f59e0b;
      color: #78350f;
    }
    .ai-label {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.65;
      display: block;
      margin-bottom: 0.15rem;
    }

    /* ── Tarjetas Consultas CNMC ── */
    .con-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--cnmc);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.6rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.4rem;
      transition: box-shadow 0.15s;
    }
    @media (min-width: 640px) {
      .con-card { grid-template-columns: 1fr auto; align-items: start; }
    }
    .con-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
    .con-card h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
    @media (min-width: 600px) { .con-card h2 { font-size: 1rem; } }
    .con-card h2 a { color: var(--text); text-decoration: none; }
    .con-card h2 a:hover { color: var(--cnmc); text-decoration: underline; }
    .con-plazo {
      background: var(--tag-bg-cnmc);
      color: var(--cnmc);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      white-space: nowrap;
      align-self: start;
      margin-top: 0.1rem;
    }
    .con-plazo-empty { color: var(--muted); font-size: 0.75rem; font-style: italic; }

    /* ── Columnas Regulación Española ── */
    #esp-cols {
      display: grid;
      grid-template-columns: 1fr;          /* móvil: una columna */
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (min-width: 700px) {
      #esp-cols {
        grid-template-columns: 1fr 1fr;    /* tablet+: dos columnas */
        gap: 0 1px;                        /* separador vertical */
        background: var(--border);         /* el gap se ve como línea */
        align-items: start;
      }
    }

    .esp-col {
      background: var(--bg);
      min-width: 0;
    }

    .esp-col-header {
      position: sticky;
      top: 96px;                           /* bajo header + tabs */
      z-index: 5;
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      border-bottom: 3px solid transparent;
    }
    .esp-col-boe  { background: var(--tag-bg-boe);  color: var(--boe);  border-bottom-color: var(--boe); }
    .esp-col-cnmc { background: var(--tag-bg-cnmc); color: var(--cnmc); border-bottom-color: var(--cnmc); }

    .esp-col-count {
      font-weight: 400;
      font-size: .75rem;
      opacity: .8;
      margin-left: auto;
    }

    .esp-col-body {
      padding: .6rem .75rem 2rem;
      overflow-y: auto;
    }
    @media (min-width: 700px) {
      .esp-col-body {
        max-height: calc(100vh - 180px);   /* scroll independiente por columna */
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>⚡ Monitor Regulatorio Energético</h1>
  <span id="last-updated">Cargando…</span>
</header>

<!-- PESTAÑAS -->
<nav class="tabs" role="tablist">
  <button class="tab-btn active" data-tab="todas" role="tab">Todas las fuentes</button>
  <button class="tab-btn"        data-tab="boe"   role="tab">📋 BOE Último Trimestre</button>
  <button class="tab-btn"        data-tab="esp"   role="tab">🇪🇸 Regulación Española</button>
  <button class="tab-btn"        data-tab="con"   role="tab">📬 Consultas CNMC</button>
</nav>

<!-- ══════════════════════ PANEL: TODAS ══════════════════════ -->
<div id="panel-todas" class="tab-panel active">
  <div class="toolbar">
    <input type="search" id="search" placeholder="Buscar por título, organismo…"
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <div class="filters">
      <button class="filter-btn active" data-source="ALL">Todos</button>
      <button class="filter-btn" data-source="BOE">BOE</button>
      <button class="filter-btn" data-source="CNMC">CNMC</button>
    </div>
    <span id="count"></span>
  </div>
  <main>
    <div id="loading" class="state-msg">Cargando datos…</div>
    <div id="entries"></div>
    <div id="empty" class="state-msg" style="display:none">No se encontraron resultados.</div>
  </main>
</div>

<!-- ══════════════════════ PANEL: BOE ÚLTIMO MES ══════════════════════ -->
<div id="panel-boe" class="tab-panel">
  <div class="boe-toolbar">
    <input type="search" id="boe-search" placeholder="Buscar en BOE del último mes…"
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <label id="boe-filter-imp">
      <input type="checkbox" id="chk-importante" />
      Solo importantes (Ley / RD / Circular)
    </label>
    <span id="boe-count"></span>
  </div>
  <main>
    <div id="boe-loading" class="state-msg">Cargando datos…</div>
    <div id="boe-entries"></div>
    <div id="boe-empty" class="state-msg" style="display:none">No se encontraron resultados.</div>
  </main>
</div>

<!-- ══════════════════════ PANEL: REGULACIÓN ESPAÑOLA ══════════════════════ -->
<div id="panel-esp" class="tab-panel">
  <div class="boe-toolbar" style="flex-wrap:wrap; gap:0.6rem 1rem;">
    <input type="search" id="esp-search" placeholder="Buscar en regulación española del Q1…"
           autocomplete="off" spellcheck="false" />
    <label id="esp-filter-imp" style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;cursor:pointer;white-space:nowrap">
      <input type="checkbox" id="chk-esp-importante" style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer" />
      Solo importantes
    </label>
    <span id="esp-range" style="font-size:.78rem;color:var(--muted);white-space:nowrap"></span>
    <span id="esp-count" style="font-size:.8rem;color:var(--muted);margin-left:auto;white-space:nowrap"></span>
  </div>
  <div id="esp-loading" class="state-msg">Cargando datos…</div>
  <div id="esp-cols">
    <!-- Columna BOE -->
    <div class="esp-col">
      <div class="esp-col-header esp-col-boe">
        📄 BOE
        <span id="esp-boe-count" class="esp-col-count"></span>
      </div>
      <div id="esp-boe-entries" class="esp-col-body"></div>
    </div>

    <!-- Columna CNMC -->
    <div class="esp-col">
      <div class="esp-col-header esp-col-cnmc">
        🏛️ CNMC
        <span id="esp-cnmc-count" class="esp-col-count"></span>
      </div>
      <div id="esp-cnmc-entries" class="esp-col-body"></div>
    </div>
  </div>
  <div id="esp-empty" class="state-msg" style="display:none">No se encontraron resultados.</div>
</div>

<!-- ══════════════════════ PANEL: CONSULTAS CNMC ══════════════════════ -->
<div id="panel-con" class="tab-panel">
  <div class="boe-toolbar">
    <input type="search" id="con-search" placeholder="Buscar consulta CNMC…"
           autocomplete="off" spellcheck="false" />
    <span id="con-count" style="font-size:.8rem;color:var(--muted);margin-left:auto;white-space:nowrap"></span>
  </div>
  <main>
    <div id="con-loading" class="state-msg">Cargando…</div>
    <div id="con-entries"></div>
    <div id="con-empty" class="state-msg" style="display:none">No se encontraron resultados.</div>
  </main>
</div>

<footer>
  Fuentes: <a href="https://www.boe.es/datosabiertos/" target="_blank" rel="noopener">API BOE</a> ·
  <a href="https://www.cnmc.es/consultas-publicas/energia" target="_blank" rel="noopener">CNMC Energía</a>
</footer>

<div id="toast"></div>

<script>
  let allEntries   = [];
  let activeSource = 'ALL';
  let activeTab    = 'todas';

  // ── Utilidades ─────────────────────────────────────────────────────
  // ── Etiqueta de recencia para entradas CNMC ──────────────────────
  // ── Resumen automático desde el título (sin API) ─────────────────
  function autoSummary(title) {
    if (!title) return '';
    // Extrae "por el/la que se ACCIÓN..." del título BOE
    const m = title.match(/por (?:el|la|los|las) que se (.{10,120}?)(?:\.|,\s*de conformidad|$)/i);
    if (m) return m[1].trim().replace(/\.$/, '') + '.';
    // Fallback: primera frase significativa
    const parts = title.split(',');
    if (parts.length >= 3) return parts.slice(2).join(',').trim().replace(/^\s*por\s*/i,'').trim();
    return '';
  }

  // ── Impacto en REE desde palabras clave (sin API) ─────────────────
  const _REE_MAP = [
    [/red de transporte/i,        "Afecta a la red de transporte de electricidad gestionada por REE."],
    [/operador del sistema/i,     "Impacta en las funciones de REE como Operador del Sistema Eléctrico."],
    [/retribuci[oó]n.*transporte|retribuci[oó]n.*operador/i,
                                  "Puede modificar la retribución económica de la actividad de transporte de REE."],
    [/planificaci[oó]n.*red/i,    "Afecta a los planes de inversión y desarrollo de la red de transporte de REE."],
    [/liquidaci[oó]n.*sistema/i,  "Incide en la liquidación del sistema eléctrico donde REE actúa como operador."],
    [/servicio.*ajuste|ajuste.*sistema/i,
                                  "Relacionado con los servicios de ajuste del sistema que coordina REE."],
    [/interconex[ií][oó]n.*internacional/i,
                                  "Afecta a las interconexiones internacionales de la red española gestionadas por REE."],
    [/ciberseguridad/i,           "Impacta en la ciberseguridad de infraestructuras críticas, incluida la red de REE."],
    [/subestaci[oó]n|l[ií]nea.*transporte|l[ií]nea.*transmisi[oó]n|LAT\b/i,
                                  "Afecta directamente a instalaciones de la red de transporte de REE."],
    [/peaje.*acceso|tarifa.*el[eé]ctrica/i,
                                  "Relacionado con los peajes de transporte que forman parte de los ingresos de REE."],
    [/mercado.*el[eé]ctrico|mercado.*diario|mercado.*intradiario/i,
                                  "Afecta al mercado eléctrico en el que REE participa como operador del sistema."],
    [/renovable|fotovoltaic|generaci[oó]n.*distribuid/i,
                                  "Impacta en la integración de energías renovables en la red de transporte de REE."],
    [/veh[ií]culo.*el[eé]ctrico/i,"Puede incrementar la demanda en la red de REE por el auge del vehículo eléctrico."],
    [/sistema.*el[eé]ctrico/i,    "Regula aspectos del sistema eléctrico en el que REE opera como gestor de la red."],
  ];

  function reeImpact(keywords, title) {
    const text = (keywords || '') + ' ' + (title || '');
    for (const [pat, msg] of _REE_MAP) {
      if (pat.test(text)) return msg;
    }
    return '';
  }

  function recencyLabel(dateStr) {
    if (!dateStr) return '';
    // dateStr puede ser DD/MM/YYYY o YYYY-MM-DD
    let d;
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
      const [day, mon, yr] = dateStr.split('/');
      d = new Date(+yr, +mon - 1, +day);
    } else {
      d = new Date(dateStr);
    }
    if (isNaN(d)) return '';

    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffMs   = today - dDate;
    const diffDays = Math.floor(diffMs / 86400000);

    // Inicio de la semana actual (lunes)
    const dayOfWeek   = (today.getDay() + 6) % 7;  // 0=lunes
    const weekStart   = new Date(today); weekStart.setDate(today.getDate() - dayOfWeek);

    const yr  = now.getFullYear();
    const mon = now.getMonth();  // 0-based
    const q   = Math.floor(mon / 3);
    const sem = Math.floor(mon / 6);

    if (diffDays === 0)
      return '<span class="recency rec-hoy">Hoy</span>';
    if (dDate >= weekStart)
      return '<span class="recency rec-semana">Esta semana</span>';
    if (d.getFullYear() === yr && d.getMonth() === mon)
      return '<span class="recency rec-mes">Este mes</span>';
    if (d.getFullYear() === yr && Math.floor(d.getMonth() / 3) === q)
      return '<span class="recency rec-trimestre">Este trimestre</span>';
    if (d.getFullYear() === yr && Math.floor(d.getMonth() / 6) === sem)
      return '<span class="recency rec-semestre">Este semestre</span>';
    if (d.getFullYear() === yr)
      return '<span class="recency rec-anio">Este año</span>';
    return '';
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, duration = 2200) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // Devuelve fecha ISO (YYYY-MM-DD) de hace N días
  function daysAgo(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }

  // Convierte DD/MM/YYYY → YYYY-MM-DD para comparar
  function toISO(ddmmyyyy) {
    if (!ddmmyyyy) return '';
    const [d, m, y] = ddmmyyyy.split('/');
    return `${y}-${m}-${d}`;
  }

  let boeTrimestre  = [];
  let regEspanola   = { boe: [], cnmc: [], year: '', rango: '' };
  let cnmcConsultas = [];

  // ── Carga de datos ─────────────────────────────────────────────────
  async function loadData() {
    try {
      const r = await fetch('data.json?v=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      document.getElementById('last-updated').textContent = 'Act.: ' + (json.updated_at || '—');
      allEntries   = json.entries        || [];
      boeTrimestre = json.boe_trimestre  || [];
      regEspanola  = json.reg_espanola    || { boe: [], cnmc: [], year: '', rango: '' };
      cnmcConsultas = json.cnmc_consultas || [];
      renderTodas();
      renderBoe();
      renderEsp();
      renderConsultas();
    } catch (e) {
      document.getElementById('loading').textContent     = 'Error: ' + e.message;
      document.getElementById('boe-loading').textContent = 'Error: ' + e.message;
    }
  }

  // ── RENDER: pestaña Todas ──────────────────────────────────────────
  function renderTodas() {
    const query     = document.getElementById('search').value.toLowerCase().trim();
    const container = document.getElementById('entries');
    document.getElementById('loading').style.display = 'none';

    const filtered = allEntries.filter(e => {
      if (activeSource !== 'ALL' && e.source !== activeSource) return false;
      if (!query) return true;
      return (e.title + ' ' + (e.department||'') + ' ' + (e.section||'') + ' ' + (e.summary||''))
        .toLowerCase().includes(query);
    });

    document.getElementById('count').textContent =
      filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');
    document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';

    container.innerHTML = filtered.map(e => `
      <div class="entry src-${e.source}">
        <div class="entry-meta">
          <span class="tag tag-${e.source}">${e.source}</span>
          ${e.published_date ? `<span class="date">${e.published_date}</span>` : ''}
          ${recencyLabel(e.published_date)}
          ${e.department && e.department !== e.source
            ? `<span class="dept">· ${escHtml(e.department)}</span>` : ''}
        </div>
        <h2>${e.url
          ? `<a href="${e.url}" target="_blank" rel="noopener">${escHtml(e.title)}</a>`
          : escHtml(e.title)}</h2>
        ${(() => { const s = e.source==='BOE' ? autoSummary(e.title) : (e.summary||''); return s ? `<div class="ai-block ai-resumen"><span class="ai-label">Resumen</span>${escHtml(s)}</div>` : ''; })()}
        ${(() => { const r = reeImpact(e.summary, e.title); return r ? `<div class="ai-block ai-ree"><span class="ai-label">⚡ Impacto en Red Eléctrica</span>${escHtml(r)}</div>` : ''; })()}
        ${e.section ? `<p class="section-badge" style="margin-top:.3rem">${escHtml(e.section)}${e.tipo ? ' › ' + escHtml(e.tipo) : ''}</p>` : ''}
        <div class="badges">
          ${e.importante      ? `<span class="badge badge-imp">⚖️ ${escHtml(e.importante)}</span>` : ''}
          ${e.acceso_conexion ? `<span class="badge badge-acc">🔌 ${escHtml(e.acceso_conexion)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── RENDER: pestaña BOE Último Trimestre ─────────────────────────
  function renderBoe() {
    const query     = document.getElementById('boe-search').value.toLowerCase().trim();
    const soloImp   = document.getElementById('chk-importante').checked;
    const container = document.getElementById('boe-entries');
    document.getElementById('boe-loading').style.display = 'none';

    const filtered = boeTrimestre.filter(e => {
      if (soloImp && e.importante !== 'Sí') return false;
      if (!query) return true;
      return (
        (e.texto       || '') + ' ' +
        (e.organismo   || '') + ' ' +
        (e.seccion     || '') + ' ' +
        (e.tipo        || '') + ' ' +
        (e.palabras_clave || '')
      ).toLowerCase().includes(query);
    });

    document.getElementById('boe-count').textContent =
      filtered.length + ' entrada' + (filtered.length !== 1 ? 's' : '');
    document.getElementById('boe-empty').style.display = filtered.length ? 'none' : 'block';

    container.innerHTML = filtered.map(e => `
      <div class="boe-card">
        <div class="boe-card-header">
          <span class="boe-date">📅 ${e.fecha || '—'}</span>
            ${recencyLabel(e.fecha)}
          ${e.tipo ? `<span class="badge badge-imp" style="font-size:.72rem">${escHtml(e.tipo)}</span>` : ''}
        </div>
        <h2>${e.enlace
          ? `<a href="${e.enlace}" target="_blank" rel="noopener">${escHtml(e.texto)}</a>`
          : escHtml(e.texto)}</h2>
        <div class="boe-fields">
          <div class="boe-field">
            <span class="boe-field-label">Sección</span>
            <span class="boe-field-value ${e.seccion ? '' : 'boe-field-empty'}">
              ${escHtml(e.seccion) || '—'}
            </span>
          </div>
          <div class="boe-field">
            <span class="boe-field-label">Organismo</span>
            <span class="boe-field-value ${e.organismo ? '' : 'boe-field-empty'}">
              ${escHtml(e.organismo) || '—'}
            </span>
          </div>
          <div class="boe-field">
            <span class="boe-field-label">Subsección</span>
            <span class="boe-field-value ${e.subseccion ? '' : 'boe-field-empty'}">
              ${escHtml(e.subseccion) || '—'}
            </span>
          </div>
          ${e.palabras_clave ? `
          <div class="boe-field" style="grid-column:1/-1">
            <span class="boe-field-label">Palabras clave</span>
            <span class="boe-field-value">${escHtml(e.palabras_clave)}</span>
          </div>` : ''}
        </div>
        ${(() => { const s = autoSummary(e.texto||''); return s ? `<div class="ai-block ai-resumen"><span class="ai-label">Resumen</span>${escHtml(s)}</div>` : ''; })()}
        ${(() => { const r = reeImpact(e.palabras_clave, e.texto); return r ? `<div class="ai-block ai-ree"><span class="ai-label">⚡ Impacto en Red Eléctrica</span>${escHtml(r)}</div>` : ''; })()}
        <div class="boe-badges">
          ${e.importante === 'Sí'     ? `<span class="badge badge-imp">⚖️ Importante</span>` : ''}
          ${e.acceso_conexion === 'Sí'? `<span class="badge badge-acc">🔌 Acceso/Conexión</span>` : ''}
          <span class="badge" style="background:#f3f4f6;color:#6b7280;font-size:.65rem">
            Publicable: ${escHtml(e.publicable || 'NO')}
          </span>
        </div>
      </div>
    `).join('');
  }

  // ── RENDER: pestaña Consultas CNMC ───────────────────────────────
  function renderConsultas() {
    const query     = document.getElementById('con-search').value.toLowerCase().trim();
    const container = document.getElementById('con-entries');
    document.getElementById('con-loading').style.display = 'none';

    const filtered = cnmcConsultas.filter(e =>
      !query || (e.title + ' ' + (e.plazo || '')).toLowerCase().includes(query)
    );

    document.getElementById('con-count').textContent =
      filtered.length + ' consulta' + (filtered.length !== 1 ? 's' : '');
    document.getElementById('con-empty').style.display =
      filtered.length ? 'none' : 'block';

    container.innerHTML = filtered.map(e => `
      <div class="con-card">
        <div>
          <h2>${e.url
            ? `<a href="${e.url}" target="_blank" rel="noopener">${escHtml(e.title)}</a>`
            : escHtml(e.title)}</h2>
          ${(() => { const s = autoSummary(e.title||''); return s ? `<div class="ai-block ai-resumen" style="margin-top:.4rem"><span class="ai-label">Resumen</span>${escHtml(s)}</div>` : ''; })()}
          ${(() => { const r = reeImpact('', e.title); return r ? `<div class="ai-block ai-ree"><span class="ai-label">⚡ Impacto en Red Eléctrica</span>${escHtml(r)}</div>` : ''; })()}
        </div>
        ${e.plazo
          ? `<span class="con-plazo">📅 ${escHtml(e.plazo)}</span>`
          : `<span class="con-plazo-empty">Plazo no disponible</span>`}
      </div>
    `).join('');
  }

  // ── RENDER: pestaña Regulación Española Q1 ───────────────────────
  function renderEsp() {
    const query    = document.getElementById('esp-search').value.toLowerCase().trim();
    const soloImp  = document.getElementById('chk-esp-importante').checked;
    document.getElementById('esp-loading').style.display = 'none';
    document.getElementById('esp-range').textContent     = regEspanola.rango || '';

    // ─ BOE Q1 ─
    const boeFiltered = (regEspanola.boe || []).filter(e => {
      if (soloImp && e.importante !== 'Sí') return false;
      if (!query) return true;
      return ((e.texto||'') + ' ' + (e.organismo||'') + ' ' + (e.seccion||'') +
              ' ' + (e.tipo||'') + ' ' + (e.palabras_clave||'')).toLowerCase().includes(query);
    });

    document.getElementById('esp-boe-count').textContent =
      '(' + boeFiltered.length + ' entrada' + (boeFiltered.length !== 1 ? 's' : '') + ')';

    document.getElementById('esp-boe-entries').innerHTML = boeFiltered.length
      ? boeFiltered.map(e => `
        <div class="boe-card">
          <div class="boe-card-header">
            <span class="boe-date">📅 ${e.fecha || '—'}</span>
            ${recencyLabel(e.fecha)}
            ${e.tipo ? `<span class="badge badge-imp" style="font-size:.72rem">${escHtml(e.tipo)}</span>` : ''}
          </div>
          <h2>${e.enlace
            ? `<a href="${e.enlace}" target="_blank" rel="noopener">${escHtml(e.texto)}</a>`
            : escHtml(e.texto)}</h2>
          <div class="boe-fields">
            <div class="boe-field">
              <span class="boe-field-label">Sección</span>
              <span class="boe-field-value">${escHtml(e.seccion) || '—'}</span>
            </div>
            <div class="boe-field">
              <span class="boe-field-label">Organismo</span>
              <span class="boe-field-value">${escHtml(e.organismo) || '—'}</span>
            </div>
            <div class="boe-field">
              <span class="boe-field-label">Subsección</span>
              <span class="boe-field-value">${escHtml(e.subseccion) || '—'}</span>
            </div>
            ${e.palabras_clave ? `
            <div class="boe-field" style="grid-column:1/-1">
              <span class="boe-field-label">Palabras clave</span>
              <span class="boe-field-value">${escHtml(e.palabras_clave)}</span>
            </div>` : ''}
          </div>
          ${(() => { const s = autoSummary(e.texto||''); return s ? `<div class="ai-block ai-resumen"><span class="ai-label">Resumen</span>${escHtml(s)}</div>` : ''; })()}
          ${(() => { const r = reeImpact(e.palabras_clave, e.texto); return r ? `<div class="ai-block ai-ree"><span class="ai-label">⚡ Impacto en Red Eléctrica</span>${escHtml(r)}</div>` : ''; })()}
          <div class="boe-badges">
            ${e.importante === 'Sí'      ? '<span class="badge badge-imp">⚖️ Importante</span>' : ''}
            ${e.acceso_conexion === 'Sí' ? '<span class="badge badge-acc">🔌 Acceso/Conexión</span>' : ''}
          </div>
        </div>`).join('')
      : '<p class="state-msg" style="padding:1rem">Sin resultados BOE para este filtro.</p>';

    // ─ CNMC Q1 ─
    const cnmcFiltered = (regEspanola.cnmc || []).filter(e => {
      if (soloImp && !e.es_circular) return false;
      if (!query) return true;
      return ((e.title||'') + ' ' + (e.department||'') + ' ' + (e.summary||'')).toLowerCase().includes(query);
    });

    document.getElementById('esp-cnmc-count').textContent =
      '(' + cnmcFiltered.length + ' entrada' + (cnmcFiltered.length !== 1 ? 's' : '') + ')';

    document.getElementById('esp-cnmc-entries').innerHTML = cnmcFiltered.length
      ? cnmcFiltered.map(e => `
        <div class="cnmc-card">
          <div class="cnmc-meta">
            ${e.published_date ? `<span class="cnmc-date">📅 ${e.published_date}</span>` : ''}
            ${recencyLabel(e.published_date)}
            ${e.es_circular ? '<span class="badge badge-acc" style="font-size:.7rem">📋 Circular</span>' : ''}
          </div>
          <h2>${e.url
            ? `<a href="${e.url}" target="_blank" rel="noopener">${escHtml(e.title)}</a>`
            : escHtml(e.title)}</h2>
          ${(() => { const r = reeImpact('', e.title); return r ? `<div class="ai-block ai-ree"><span class="ai-label">⚡ Impacto en Red Eléctrica</span>${escHtml(r)}</div>` : ''; })()}
        </div>`).join('')
      : '<p class="state-msg" style="padding:1rem">Sin resultados CNMC para este filtro.</p>';

    // Vacío global
    const total = boeFiltered.length + cnmcFiltered.length;
    document.getElementById('esp-count').textContent =
      total + ' entrada' + (total !== 1 ? 's' : '');
    document.getElementById('esp-empty').style.display =
      (total === 0 && query) ? 'block' : 'none';
  }

  // ── Navegación entre pestañas ──────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      activeTab = btn.dataset.tab;
    });
  });

  // ── Eventos de filtro ──────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', renderTodas);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSource = btn.dataset.source;
      renderTodas();
    });
  });

  document.getElementById('boe-search').addEventListener('input', renderBoe);
  document.getElementById('chk-importante').addEventListener('change', renderBoe);
  document.getElementById('con-search').addEventListener('input', renderConsultas);
  document.getElementById('esp-search').addEventListener('input', renderEsp);
  document.getElementById('chk-esp-importante').addEventListener('change', renderEsp);

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadData();
  });

  loadData();
</script>
</body>
</html>
