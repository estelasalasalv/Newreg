<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56a3" />
  <title>Monitor Regulatorio Energético</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #1a56a3;
      --primary-dark: #143f7a;
      --accent: #e8f0fe;
      --border: #dde3ec;
      --text: #1f2937;
      --muted: #6b7280;
      --boe: #1a56a3;
      --cnmc: #0f7b55;
      --tag-bg-boe: #dbeafe;
      --tag-bg-cnmc: #d1fae5;
      --refresh-size: 44px; /* mínimo área táctil recomendado */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      /* evita scroll horizontal accidental en móvil */
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      flex: 1;
    }
    /* en pantallas ≥ 480px el título puede crecer */
    @media (min-width: 480px) { header h1 { font-size: 1.2rem; } }
    @media (min-width: 768px) { header h1 { font-size: 1.35rem; } }

    #last-updated {
      font-size: 0.72rem;
      opacity: 0.8;
      text-align: right;
      white-space: nowrap;
      /* oculto en móvil muy pequeño para no amontonar */
      display: none;
    }
    @media (min-width: 400px) { #last-updated { display: block; } }

    /* ── BOTÓN ACTUALIZAR ───────────────────────────────────────────── */
    #btn-refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--refresh-size);
      height: var(--refresh-size);
      min-width: var(--refresh-size);
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      font-size: 1.1rem;
      transition: background 0.2s, transform 0.3s;
      /* accesibilidad táctil */
      -webkit-tap-highlight-color: transparent;
    }
    #btn-refresh:hover  { background: rgba(255,255,255,0.25); }
    #btn-refresh:active { background: rgba(255,255,255,0.35); }
    #btn-refresh.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR ────────────────────────────────────────────────────── */
    .toolbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .toolbar input {
      flex: 1 1 100%;          /* ocupa toda la fila en móvil */
      min-width: 0;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;         /* ≥16px evita zoom automático en iOS */
      background: var(--bg);
    }
    /* en pantallas mayores el buscador comparte fila con filtros */
    @media (min-width: 560px) { .toolbar input { flex: 1 1 200px; } }

    .filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      /* área táctil mínima */
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--primary); }
    .filter-btn[data-source="BOE"].active  { background: var(--tag-bg-boe);  border-color: var(--boe); }
    .filter-btn[data-source="CNMC"].active { background: var(--tag-bg-cnmc); border-color: var(--cnmc); }

    #count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
      align-self: center;
    }

    /* ── LISTA DE ENTRADAS ──────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0.75rem 0.75rem 2rem;
    }
    @media (min-width: 768px) { main { padding: 1.25rem 1rem 2rem; } }

    .entry {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      transition: box-shadow 0.15s;
      /* borde de color izquierdo según fuente */
      border-left-width: 4px;
    }
    .entry.src-BOE  { border-left-color: var(--boe); }
    .entry.src-CNMC { border-left-color: var(--cnmc); }
    .entry:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .tag {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tag-BOE  { background: var(--tag-bg-boe);  color: var(--boe); }
    .tag-CNMC { background: var(--tag-bg-cnmc); color: var(--cnmc); }
    .date { font-size: 0.78rem; color: var(--muted); }
    .dept { font-size: 0.76rem; color: var(--muted); }

    .entry h2 {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 0.3rem;
    }
    /* títulos algo mayores en pantallas grandes */
    @media (min-width: 600px) { .entry h2 { font-size: 1rem; } }

    .entry h2 a { color: var(--text); text-decoration: none; }
    .entry h2 a:hover { color: var(--primary); text-decoration: underline; }

    .summary {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.25rem;
    }
    .section-badge { font-size: 0.73rem; color: var(--muted); font-style: italic; }

    /* ── ESTADOS ────────────────────────────────────────────────────── */
    #empty, #loading {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    #empty { display: none; }

    /* ── TOAST "actualizando" ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f2937;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 24px;
      font-size: 0.85rem;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── FOOTER ─────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 1.5rem 1rem;
    }
    footer a { color: var(--primary); }
  </style>
</head>
<body>

<header>
  <h1>⚡ Monitor Regulatorio Energético</h1>
  <span id="last-updated">Cargando…</span>
  <button id="btn-refresh" title="Actualizar datos" aria-label="Actualizar datos">&#8635;</button>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Buscar por título, organismo…"
         autocomplete="off" autocorrect="off" spellcheck="false" />
  <div class="filters">
    <button class="filter-btn active" data-source="ALL">Todos</button>
    <button class="filter-btn" data-source="BOE">BOE</button>
    <button class="filter-btn" data-source="CNMC">CNMC</button>
  </div>
  <span id="count"></span>
</div>

<main>
  <div id="loading">Cargando datos…</div>
  <div id="entries"></div>
  <div id="empty">No se encontraron resultados.</div>
</main>

<footer>
  Fuentes: <a href="https://www.boe.es/datosabiertos/" target="_blank" rel="noopener">API BOE</a> ·
  <a href="https://www.cnmc.es/consultas-publicas/energia" target="_blank" rel="noopener">CNMC Energía</a>
</footer>

<div id="toast"></div>

<script>
  let allEntries = [];
  let activeSource = 'ALL';

  // ── Toast ──────────────────────────────────────────────────────────
  function showToast(msg, duration = 2200) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Cargar / actualizar datos ──────────────────────────────────────
  async function loadData(isRefresh = false) {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    if (isRefresh) showToast('Actualizando datos…', 3000);

    try {
      const r = await fetch('data.json?v=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();

      document.getElementById('last-updated').textContent =
        'Act.: ' + (json.updated_at || '—');
      allEntries = json.entries || [];
      render();

      if (isRefresh) showToast('✓ Datos actualizados');
    } catch (e) {
      document.getElementById('loading').textContent =
        'Error cargando datos: ' + e.message;
      if (isRefresh) showToast('Error al actualizar');
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── Renderizar lista filtrada ──────────────────────────────────────
  function render() {
    const query   = document.getElementById('search').value.toLowerCase().trim();
    const container = document.getElementById('entries');
    const loading   = document.getElementById('loading');
    const empty     = document.getElementById('empty');
    loading.style.display = 'none';

    const filtered = allEntries.filter(e => {
      if (activeSource !== 'ALL' && e.source !== activeSource) return false;
      if (!query) return true;
      return (e.title + ' ' + (e.department || '') + ' ' +
              (e.section || '') + ' ' + (e.summary || ''))
        .toLowerCase().includes(query);
    });

    document.getElementById('count').textContent =
      filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');

    if (!filtered.length) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    container.innerHTML = filtered.map(e => `
      <div class="entry src-${e.source}">
        <div class="entry-meta">
          <span class="tag tag-${e.source}">${e.source}</span>
          ${e.published_date ? `<span class="date">${e.published_date}</span>` : ''}
          ${e.department && e.department !== e.source
            ? `<span class="dept">· ${escHtml(e.department)}</span>` : ''}
        </div>
        <h2>
          ${e.url
            ? `<a href="${e.url}" target="_blank" rel="noopener">${escHtml(e.title)}</a>`
            : escHtml(e.title)}
        </h2>
        ${e.summary  ? `<p class="summary">${escHtml(e.summary)}</p>` : ''}
        ${e.section  ? `<p class="section-badge">${escHtml(e.section)}</p>` : ''}
      </div>
    `).join('');
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Eventos ────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', render);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSource = btn.dataset.source;
      render();
    });
  });

  document.getElementById('btn-refresh').addEventListener('click', () => loadData(true));

  // Recarga automática al volver a la pestaña (útil en móvil)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadData(false);
  });

  loadData();
</script>
</body>
</html>
